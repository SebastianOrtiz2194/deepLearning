spring:
  application:
    name: inference-worker

  # Redis connection for persisting job status and results
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Kafka consumer configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: dl-worker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Custom application properties
app:
  kafka:
    topic:
      dl-tasks: dl-tasks-topic

# Actuator health and info endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

---
# Development profile — verbose logging, optional stub engine
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.deeplearning: DEBUG

---
# Production profile — info-level logging with real DJL engine
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.deeplearning: INFO

---
# Stub profile — uses StubInferenceEngine instead of real DJL
spring:
  config:
    activate:
      on-profile: stub

logging:
  level:
    com.deeplearning: DEBUG
